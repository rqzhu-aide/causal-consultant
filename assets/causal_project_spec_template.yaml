---
# Lean causal project state template.
# Allowed enum values live in assets/workflow_enums.yaml.

project:
  project_name: null
  short_label: null
  analyst: null
  date_started: null
  last_updated: null
  state_folder: null
  project_yaml: "project.yaml"
  analyses_dir: "analyses/"
  artifacts_dir: "artifacts/"
  project_status: "active"
  current_phase: "foundation"

main_skill:
  user_goal: null
  primary_intent: "unknown"
  rigor_mode: "unknown"
  conversation_style: "unknown"
  selected_next_action: "unknown"
  summary_for_user: null
  open_questions: []
  assumptions_to_surface: []
  user_directed:
    requested: false
    intent_basis: "none"
    acknowledged_limits: false
    requested_scope: []
    allowed_scope: []
    prohibited_claims: []
    warning: null

# User-directed/user-forced continuation is intentionally not a foundation_gate.status.
# Track it in main_skill.user_directed and analysis.route_commitment_status.
foundation_gate:
  status: "exploratory"
  can_support_causal_commitment: false
  blockers: []
  unresolved_required_information: []
  assumptions_to_surface: []
  surfaced_or_acknowledged_assumptions: []
  deferred_assumptions: []
  claim_strength_allowed: "exploratory"

production_gate:
  status: "not ready"
  can_handoff_to_report_writer: false
  blockers: []
  unresolved_required_materials: []
  required_outputs: []
  completed_outputs: []
  diagnostics_status: "not started"
  reportable_evidence: false
  claim_strength_for_report: "unknown"
  handoff_summary: null

evaluator_loop:
  trigger: "unknown"
  selected_next_action: "unknown"
  selected_reviewers: []
  review_purpose: null
  action_queue: []
  loop_control:
    status: "not assessed"
    repeated_cycle_count: 0
    issue_signature: null
    break_action: "unknown"
    rationale: null
    decisive_question_or_assumption: null

evaluators:
  domain_helper_01:
    readiness: "unknown"
    summary: null
    key_findings: []
    candidate_formulations: []
    handoff_notes: []
    requests_for_main_skill: []
    load_bearing_assumptions: []
  data_technician_02:
    readiness: "unknown"
    readiness_scope: "unknown"
    data_status: "unknown"
    summary: null
    key_findings: []
    data_enabled_opportunities: []
    method_fit_suggestions: []
    handoff_notes: []
    requests_for_main_skill: []
    load_bearing_assumptions: []
  design_planner_03:
    readiness: "unknown"
    design_status: "unknown"
    preferred_route_id: null
    summary: null
    key_findings: []
    route_hypotheses: []
    handoff_notes: []
    requests_for_main_skill: []
    load_bearing_assumptions: []
  dag_builder_04:
    readiness: "unknown"
    supported_status: "unknown"
    supported_scope: "unknown"
    identification_status: "unknown"
    summary: null
    key_findings: []
    causal_logic_hypotheses: []
    handoff_notes: []
    requests_for_main_skill: []
    load_bearing_assumptions: []

routes:
  current_route_id: null
  hypotheses: []
  rejected_or_deferred: []

analysis:
  route_commitment_status: "unknown"
  execution_stage: "not started"
  execution_confirmation:
    plan_summary: null
    user_confirmed_plan: false
    confirmation_basis: "unknown"
    confirmed_at: null
  recommended_method_job_subskills: []
  activated_method_job_subskills: []
  analyses: []
  first_pass_summary: null
  recommended_diagnostics: []
  production_loop:
    selected_reviewers: []
    review_purpose: "not needed"
    action_queue: []
    # Reviewer summaries are for production reviewers without activated
    # subskill_analyses chunks, usually Data Technician or Report Writer
    # production-reviewer mode. Method/job feedback lives in subskill_analyses.
    reviewer_summaries: []
    readiness: "not started"
    recommended_next_action: "unknown"
    foundation_recheck:
      triggered: false
      reason: null
      severity: "none"
      affected_foundation_sections: []
      recommended_reviewers: []
      main_skill_decision: "none"
    loop_control:
      status: "not assessed"
      repeated_cycle_count: 0
      issue_signature: null
      break_action: "unknown"
      rationale: null
  report_writer_20:
    mode: "not selected"
    status: "not needed"
    production_feedback: []
    summary: null
    artifacts: []
    revision_questions: []
  claim_strength: "unknown"
  limitations: []

# Append one method/job record only when that subskill is activated.
# Use assets/method_job_subskill_record_template.yaml as the chunk shape.
