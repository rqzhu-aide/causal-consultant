---
# Lean causal project state template.
# Controlled values live in assets/workflow_enums.yaml.

project_summary:
  project_name: null
  date_started: null
  last_updated: null
  user_goal: null
  deliverable: null
  audience: null
  current_phase: "project_exploration"
  project_status: []
  dataset_location: null
  analyses_report_folder: null

team_synthesis:
  user_turn_summary: null
  turn_goal: null
  facts_or_working_facts: []
  what_is_missing: []
  key_tensions: []
  material_updates_this_turn: []
  ready_to_reply: false
  reply_reason: null

causal_gate:
  status: "exploratory"
  blockers: []
  unresolved_required_information: []
  claim_strength_allowed: "exploratory"

production_gate:
  status: "not_ready"
  blockers: []
  unresolved_required_materials: []
  diagnostics_status: "not_started"
  reportable_evidence: false
  claim_strength_for_report: "unknown"
  report_completion_summary: null
  # For polished/final reports, use report_completion_summary plus blockers or
  # unresolved_required_materials to note whether data, method, domain, and
  # activated specialist owner reviews are approved, revised, or deferred.

working_agenda:
  intent: null
  information_to_get: []
  priority: "unknown"

# Lean shared variable index. Keep only variables or variable families that
# matter for the causal question, data construction, design, diagnostics, or
# report. Rich inventories stay in reviewer fields or artifacts.
variable_roster: []
# Each entry:
#   variable_id: null        # lead or data_analyst: stable short name
#   label: null              # lead or data_analyst: user's/domain label
#   user_stated_role: null   # lead: provisional role from user framing
#   domain_meaning: null     # domain_expert: construct meaning
#   data_binding: []         # data_analyst: compact source/column/artifact links
#   data_status: null        # data_analyst: available|constructible|proxy_only|
#                            #               needs_inspection|unavailable|ambiguous
#   method_role: null        # method_lead: final causal/design role
#   method_use_note: null    # method_lead: usage rule or caution

bounded_continuation:
  # User-forced or bounded progress despite unresolved blockers.
  # This never clears gate blockers or upgrades claim strength by itself.
  requested: false
  acknowledged_limits: false
  requested_scope: []
  allowed_scope: []
  prohibited_claims: []
  warning: null

next_action:
  type: "question"
  content: null
  needs_user_response: true

domain_expert:
  status: "not_reviewed"
  domain_context: null
  construct_guidance: []
  causal_structure_guidance: []
  domain_data_guidance: []
  meaningful_effect_scale: null
  common_practice_guidance: []
  constraints_and_external_validity: []
  interpretation_guidance: []
  wording_cautions: []
  blockers: []
  requests_for_progression: []

data_analyst:
  status: "not_reviewed"
  phase_role: "project_exploration"
  data_sources: []
  data_status: "unknown"
  unit_of_observation: null
  unit_of_analysis: null
  data_properties: []
  domain_processing_guidance: []
  variable_map:
    exposure: []
    comparator: []
    outcome: []
    covariates: []
    ids: []
    time_fields: []
  timing_windows: []
  missingness_selection: []
  data_quality_issues: []
  exploratory_outputs: []
  method_support:
    data_compatible_frameworks: []
    processing_pipeline_suggestions: []
    learner_plugin_handoffs: []
    diagnostic_artifact_suggestions: []
    feasibility_notes: []
  analysis_alignment:
    # Living crosswalk from current causal/report needs to what the data support.
    # Update when data, claims, framework, estimands, diagnostics, or report
    # wording change, including data role/provenance concerns that affect
    # interpretation. This is data evidence for method_lead, not causal approval.
    status: "not_checked"
    aligned_to:
      user_goal: null
      selected_framework_id: null
      estimands: []
      intended_claims: []
      report_or_analysis_target: null
    checked_against:
      validity_requirements: []
      causal_structure_items: []
      gate_requirements: []
      prior_warnings_or_user_constraints: []
    requirement_checks: []
    # Each requirement_checks entry:
    #   requirement: null
    #   source: null
    #   required_for: []
    #   data_support: null       # directly_supported|constructible_with_processing|
    #                            # proxy_only|needs_inspection|unsupported|
    #                            # contradicted|not_applicable
    #   evidence_pointer: null
    #   related_variables: []
    #   gap_type: null           # missing_variable|timing_unclear|proxy_only|
    #                            # support_problem|selection_or_censoring|
    #                            # provenance_unverified|simplification|
    #                            # diagnostic_missing|none
    #   claim_impact: null       # no_material_impact|weakens_claim|
    #                            # blocks_causal_claim|blocks_reportable_evidence|
    #                            # requires_bounded_continuation
    #   possible_resolution: null
    data_simplifications_affecting_claims: []
    unsupported_or_overstated_claims: []
    data_supported_claim_ceiling: "unknown"
    alignment_summary: null
    requests_for_resolution: []
  analysis_dataset:
    path: null
    construction_status: "not_started"
    reproducibility_notes: []
  report_production_outputs:
    code_paths: []
    table_paths: []
    figure_paths: []
  report_assets:
    final_tables: []
    final_figures: []
    appendix_materials: []
  blockers: []
  requests_for_progression: []

method_lead:
  status: "not_reviewed"
  causal_question:
    plain_language_question: null
    exposure_or_intervention: null
    comparator: null
    outcome: null
    population: null
    time_zero: null
    follow_up: null
    causal_unit: null
  causal_question_variants: []
  analysis_framework_candidates: []
  selected_framework:
    framework_id: null
    user_intent: null
    fit: "unknown"
    why_selected: null
  causal_claims: []
  estimand_set:
    primary: []
    secondary: []
    exploratory_or_descriptive: []
    notes: null
  validity_requirements: []
  causal_structure:
    # Progressive causal-structure memory. Keep YAML decision-relevant and put
    # detailed DAGs, SWIGs, timing diagrams, or edge tables in artifacts.
    narrative: null
    graph_artifact: null
    edge_summary: []
    role_summary: []
    timing_constraints: []
    forbidden_adjustments: []
    identification_status: "unknown"
    identification_gaps: []
    assumptions: []
  method_literature_guidance: []
  tools_and_methods:
    candidate_tools: []
    candidate_method_subskills: []
    selected_tools: []
    selected_method_subskills: []
    blocked_or_not_used_options: []
  diagnostics_plan: []
  sensitivity_plan: []
  report_wording_boundary: []
  blockers: []
  requests_for_progression: []

analysis_state:
  project_exploration_outputs: []
  causal_specification_artifacts: []
  # Include both source report paths and rendered report paths when HTML,
  # PDF, slides, or another rendered artifact is produced.
  report_production_artifacts: []
  report_working_draft_path: null
  report_structure_notes_path: null
  recommended_method_job_subskills: []
  discovery_sidecar:
    active: false
    purpose: null
    return_to_phase: null
    affects_main_framework: false
    artifact_paths: []
  limitations: []

# Append one filled method/task record only when that subskill is activated
# or produces durable feedback. Use assets/method_job_subskill_record_template.yaml.
# Optional causal-discovery trace records may also use the same compact-record idea.
# Report Writer does not append its own record; it consumes this state plus
# report_structure_notes, the working report, and artifacts when compiling reports.
subskill_records: []

retired_tasks:
  task_parking_lot:
    current_task: null
    parked_tasks: []

artifact_index:
  - artifact_id: "01-domain-expert"
    artifact_type: "subskill"
    path: "subskills/01-domain-expert/SKILL.md"
    purpose: "domain meaning, construct guidance, causal-structure guidance, data-processing standards, interpretation, external validity, and wording cautions"
  - artifact_id: "02-data-analyst"
    artifact_type: "subskill"
    path: "subskills/02-data-analyst/SKILL.md"
    purpose: "data sources, structure, variables, timing, missingness, exploratory outputs, method-support handoffs, reproducibility, and report assets"
  - artifact_id: "03-method-lead"
    artifact_type: "subskill"
    path: "subskills/03-method-lead/SKILL.md"
    purpose: "causal question variants, frameworks, estimand set, validity requirements, causal structure, assumptions, method literature, diagnostics, sensitivity, and wording boundary"
  - artifact_id: "03-statistical-validity-reference"
    artifact_type: "reference"
    path: "subskills/03-method-lead/references/statistical_validity.md"
    purpose: "deeper method-lead guidance for claim-strength decisions, same-data selection risks, data-provenance limits, method-specific validation routes, and bounded diagnostic requests"
  - artifact_id: "03-subskill-triage-reference"
    artifact_type: "reference"
    path: "subskills/03-method-lead/references/subskill_triage.md"
    purpose: "deeper method-lead guidance for classifying, selecting, blocking, or activating method/job subskills"
  - artifact_id: "03-red-flags-reference"
    artifact_type: "reference"
    path: "subskills/03-method-lead/references/red_flags.md"
    purpose: "detailed causal-method red flags and response pattern for blockers, diagnostics, wording boundaries, and progression requests"
  - artifact_id: "05-report-writer"
    artifact_type: "subskill"
    path: "subskills/05-report-writer/SKILL.md"
    purpose: "polished project notebook, Markdown working report, and controlled report compilation"
  - artifact_id: "05-report-structure-notes-template"
    artifact_type: "template"
    path: "subskills/05-report-writer/assets/report_structure_notes_template.md"
    purpose: "private report-structure notes for future argument, section, evidence, module, figure/table, code, and limitation planning"
  - artifact_id: "05-scientific-report-workflow"
    artifact_type: "reference"
    path: "subskills/05-report-writer/references/scientific_report_workflow.md"
    purpose: "compact report-writing workflow for simple structure, evidence-first prose, references, figures/tables, model diagnostics, appendices, and polish"
  - artifact_id: "06-causal-discovery"
    artifact_type: "subskill"
    path: "subskills/06-causal-discovery/SKILL.md"
    purpose: "any-phase causal discovery sidecar"
  - artifact_id: "07-randomized-assignment-and-experiments"
    artifact_type: "subskill"
    path: "subskills/07-randomized-assignment-and-experiments/SKILL.md"
    purpose: "design route for randomized assignment, experiments, trials, encouragement, noncompliance, and experiment diagnostics"
  - artifact_id: "08-single-time-observational-exposure"
    artifact_type: "subskill"
    path: "subskills/08-single-time-observational-exposure/SKILL.md"
    purpose: "design route for single-time observational exposure, target-trial-style framing, adjustment, support, and confounding checks"
  - artifact_id: "09-longitudinal-gmethods"
    artifact_type: "subskill"
    path: "subskills/09-longitudinal-gmethods/SKILL.md"
    purpose: "design route for longitudinal treatment, time-varying confounding, g-methods, and sequential causal validity"
  - artifact_id: "10-did-event-study"
    artifact_type: "subskill"
    path: "subskills/10-did-event-study/SKILL.md"
    purpose: "design route for difference-in-differences, event studies, staggered adoption, group-time ATT, synthetic DiD, DR-DiD, TWFE cautions, and parallel-trend diagnostics"
  - artifact_id: "11-regression-discontinuity"
    artifact_type: "subskill"
    path: "subskills/11-regression-discontinuity/SKILL.md"
    purpose: "design route for cutoff-based local causal effects, sharp/fuzzy RD, regression kink, local randomization, geographic/time cutoffs, bandwidths, density/manipulation checks, and RD report support"
  - artifact_id: "12-instrumental-variables"
    artifact_type: "subskill"
    path: "subskills/12-instrumental-variables/SKILL.md"
    purpose: "design route for instruments, encouragement, noncompliance, LATE/CACE, weak instruments, IV-DML, and Mendelian randomization checks"
  - artifact_id: "13-synthetic-control-time-series"
    artifact_type: "subskill"
    path: "subskills/13-synthetic-control-time-series/SKILL.md"
    purpose: "design route for synthetic control, augmented/generalized SCM, synthetic DiD, interrupted time series, Bayesian structural time series, aggregate interventions, and donor-pool diagnostics"
  - artifact_id: "14-interference-spillovers"
    artifact_type: "subskill"
    path: "subskills/14-interference-spillovers/SKILL.md"
    purpose: "design route for interference, spillovers, peer effects, contagion, contamination, network/geographic exposure, partial interference, treatment saturation, exposure mapping, and direct/indirect/total effect support"
  - artifact_id: "15-negative-controls-proximal"
    artifact_type: "subskill"
    path: "subskills/15-negative-controls-proximal/SKILL.md"
    purpose: "design route for negative controls, placebo/falsification tests, empirical calibration, proximal causal inference, proxy variables, bridge functions, and unmeasured-confounding probes"
  - artifact_id: "20-heterogeneous-effects"
    artifact_type: "subskill"
    path: "subskills/20-heterogeneous-effects/SKILL.md"
    purpose: "target goal for heterogeneous effects, subgroup or strata effects, CATE/GATE/ITE, and effect modification"
  - artifact_id: "21-point-treatment-rules"
    artifact_type: "subskill"
    path: "subskills/21-point-treatment-rules/SKILL.md"
    purpose: "target goal for single-point individualized treatment rules, targeting, policy value, uplift, and prioritization"
  - artifact_id: "22-mediation"
    artifact_type: "subskill"
    path: "subskills/22-mediation/SKILL.md"
    purpose: "target goal for mediation, mechanisms, pathways, direct/indirect effects, and mediator timing"
  - artifact_id: "23-dose-response-effects"
    artifact_type: "subskill"
    path: "subskills/23-dose-response-effects/SKILL.md"
    purpose: "target goal for dose-response, exposure-response, continuous or multi-level treatments, thresholds, and modified treatment policies"
  - artifact_id: "24-transportability-generalizability"
    artifact_type: "subskill"
    path: "subskills/24-transportability-generalizability/SKILL.md"
    purpose: "target goal for transportability, generalizability, target-population effects, and trial-to-target translation"
  - artifact_id: "25-dynamic-treatment-policies"
    artifact_type: "subskill"
    path: "subskills/25-dynamic-treatment-policies/SKILL.md"
    purpose: "target goal for dynamic treatment policies, adaptive strategies, sequential decision rules, and policy-value targets"
  - artifact_id: "30-matching-weighting-balance"
    artifact_type: "subskill"
    path: "subskills/30-matching-weighting-balance/SKILL.md"
    purpose: "implementation support for matching, weighting, propensity scores, overlap, positivity, and balance diagnostics"
  - artifact_id: "31-doubly-robust-estimation"
    artifact_type: "subskill"
    path: "subskills/31-doubly-robust-estimation/SKILL.md"
    purpose: "implementation support for AIPW, TMLE, one-step estimators, nuisance models, and doubly robust estimation"
  - artifact_id: "32-double-machine-learning"
    artifact_type: "subskill"
    path: "subskills/32-double-machine-learning/SKILL.md"
    purpose: "implementation support for orthogonal/DML estimation, cross-fitting, residualization, and ML nuisance learners"
  - artifact_id: "33-survival-competing-risks"
    artifact_type: "subskill"
    path: "subskills/33-survival-competing-risks/SKILL.md"
    purpose: "implementation support for time-to-event outcomes, censoring, competing risks, fixed-time risk, RMST, survival CATE, survival nuisance models, and survival reporting"
