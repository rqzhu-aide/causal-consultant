---
# Compact record for an activated method/task subskill.
# Append one filled copy to project YAML > subskill_records only when a
# method/task subskill is activated or produces durable feedback.
# Controlled values live in assets/workflow_enums.yaml.

subskill_id: null
module_type: null
role: null
status: null
activation_reason: null
inputs_reviewed: []
provenance_summary: null
fit_summary:
  fit: "unknown"
  reason: null

# In a filled record, keep and complete only the packet that matches
# module_type: design_route, target_goal, or implementation_support.
# Discovery sidecar records may use the common fields plus their own local
# packet shape when needed. Report-support material belongs in report_support
# and is later integrated by Report Writer; Report Writer does not append a
# separate subskill_records entry for itself.
type_specific:
  design_route:
    causal_comparison: null
    design_route: null
    identification_status: null
    required_timing: []
    comparison_group_logic: null
    key_identification_assumptions: []
    invalidating_conditions: []
    estimands_supported: []
  target_goal:
    target_goal: null
    estimand_targets: []
    target_population: null
    effect_scale: null
    decision_or_interpretation_goal: null
    design_route_needed: null
    reporting_boundary: null
  implementation_support:
    implementation_role: null
    estimator_or_model_family: []
    required_data_shape: null
    nuisance_or_prediction_components: []
    diagnostic_outputs: []
    reproducibility_outputs: []
    package_or_code_options: []

assumptions_or_requirements: []

# Claim-boundary handoff for method_lead and data_analyst.
# Fill for every activated method/task subskill when durable feedback is returned.
statistical_evidence:
  status: "not_assessed"       # strongest current evidence level
  claim_scope: "unknown"       # what population/result type the claim can cover
  inference_or_validation_route: []  # method-specific route needed or used for stronger claims
  method_specific_limits: []    # exact wording limits and what the method does not support
diagnostics_needed: []
diagnostics_reviewed: []
sensitivity_or_robustness: []
limitations: []
requests:
  domain_expert: []
  data_analyst: []
  method_lead: []
  user: []
  other_subskills: []
report_support: []
readiness: "unknown"
method_lead_recheck:
  required: false
  reason: null
blocking_signal:
  blocks_current_phase: false
  target_phase: null
  severity: "none"
  reason: null
  affected_sections: []
recommended_next_action: null
artifact_paths: []
