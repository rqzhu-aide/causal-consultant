# Forward-testing fixtures for the causal-consultant actor/kernel workflow.
#
# These are acceptance fixtures, not complete valid project.yaml files. Each case
# gives realistic user turns plus the state transitions that should be visible in
# project.yaml after the main skill and selected reviewers do their work.

fixture_schema: "1.0"
default_assertions:
  - "Subskills do not speak directly to the user unless explicitly requested."
  - "The main skill owns foundation_gate.status and production_gate.status."
  - "Detailed data audits, code, plots, tables, and drafts stay in analyses/ or artifacts/ with compact YAML summaries."
  - "Reviewer selection uses the smallest useful set that could change the next action."

cases:
  - case_id: "cold_start_email_retention_missing_assignment"
    title: "Cold-start effect question with partial behavioral data"
    user_turns:
      - "I want to know if our new onboarding emails improved 30-day retention. We have user events and signup dates but I am not sure we kept the assignment log."
    expected_transitions:
      - path: "project.current_phase"
        expected: "foundation"
      - path: "main_skill.primary_intent"
        expected: "estimate effect"
      - path: "main_skill.conversation_style"
        expected: "suggest-and-invite"
      - path: "evaluator_loop.selected_reviewers"
        expected_contains:
          - "01-domain-helper"
          - "02-data-technician"
          - "03-design-planner"
          - "04-dag-builder"
      - path: "evaluators.data_technician_02.data_status"
        expected_any_of:
          - "partially existing"
          - "unknown"
      - path: "routes.hypotheses"
        expected_contains_route_families:
          - "randomized experiment if assignment is recoverable"
          - "observational fallback if assignment is not recoverable"
      - path: "foundation_gate.status"
        expected: "exploratory"
      - path: "main_skill.selected_next_action"
        expected_any_of:
          - "ask_user"
          - "inspect_data"
    user_facing_expectation: "Ask one focused question or request the assignment/log schema; do not dump an intake form."

  - case_id: "ab_test_foundation_ready_needs_plan_confirmation"
    title: "Recoverable randomized A/B test reaches foundation gate"
    user_turns:
      - "We found the assignment table. It has user_id, variant, assigned_at, and experiment_id. Outcome is active_30d from events after assigned_at."
      - "The experiment was randomized at user signup; no one was excluded after assignment except users with no valid signup timestamp."
    expected_transitions:
      - path: "project.current_phase"
        expected: "foundation"
      - path: "routes.current_route_id"
        expected_recorded: true
      - path: "routes.hypotheses"
        expected_selected_design_family: "randomized experiment"
      - path: "evaluators.data_technician_02.readiness_scope"
        expected_any_of:
          - "gate commitment"
          - "method-specific modeling"
      - path: "evaluators.dag_builder_04.identification_status"
        expected: "yes"
      - path: "foundation_gate.status"
        expected: "ready"
      - path: "foundation_gate.can_support_causal_commitment"
        expected: true
      - path: "analysis.route_commitment_status"
        expected_any_of:
          - "ready"
          - "committed"
      - path: "main_skill.selected_next_action"
        expected: "confirm_analysis_plan"
      - path: "production_gate.status"
        expected: "not ready"
    user_facing_expectation: "Confirm treatment, comparator, outcome, unit/time, estimator family, diagnostics, and claim strength before substantial modeling."

  - case_id: "observational_missing_confounders_user_directed"
    title: "User asks to proceed despite blocked causal support"
    user_turns:
      - "We only have treated customers and untreated customers with age and state, but no baseline usage or reason they got the offer."
      - "I understand it is weak, but just run something directional for tomorrow."
    expected_transitions:
      - path: "project.current_phase"
        expected: "foundation"
      - path: "foundation_gate.status"
        expected_any_of:
          - "exploratory"
          - "blocked"
      - path: "foundation_gate.can_support_causal_commitment"
        expected: false
      - path: "main_skill.user_directed.requested"
        expected: true
      - path: "main_skill.user_directed.acknowledged_limits"
        expected: true
      - path: "analysis.route_commitment_status"
        expected: "user-directed"
      - path: "analysis.claim_strength"
        expected_any_of:
          - "associational"
          - "exploratory"
      - path: "production_gate.status"
        expected: "not ready"
      - path: "main_skill.selected_next_action"
        expected_any_of:
          - "proceed_with_caveat"
          - "inspect_data"
    user_facing_expectation: "Give a brief validity warning, label the output as exploratory/associational, and proceed only within the allowed caveated scope."

  - case_id: "observational_first_pass_requires_diagnostics"
    title: "Foundation-ready observational route moves through first-pass production"
    user_turns:
      - "We agreed on a point-treatment observational route. Treatment is offer exposure at first eligible visit, outcome is purchase within 14 days, and we have pre-treatment browsing history."
      - "Yes, run the adjusted first pass with propensity weighting and show me what checks come next."
    expected_transitions:
      - path: "project.current_phase"
        expected: "production"
      - path: "foundation_gate.status"
        expected: "ready"
      - path: "analysis.execution_confirmation.user_confirmed_plan"
        expected: true
      - path: "analysis.activated_method_job_subskills"
        expected_contains:
          - "06-point-treatment-observational"
          - "07-matching-weighting-balance"
      - path: "analysis.execution_stage"
        expected_any_of:
          - "first pass run"
          - "diagnostics proposed"
      - path: "analysis.production_loop.selected_reviewers"
        expected_contains_any:
          - "06-point-treatment-observational"
          - "07-matching-weighting-balance"
          - "02-data-technician"
      - path: "analysis.production_loop.readiness"
        expected_any_of:
          - "first pass complete"
          - "diagnostics needed"
      - path: "production_gate.diagnostics_status"
        expected_any_of:
          - "needed"
          - "not started"
      - path: "production_gate.status"
        expected: "not ready"
    user_facing_expectation: "Report first-pass evidence plainly and route immediately to balance/overlap, sensitivity, and reproducibility checks rather than final prose."

  - case_id: "production_data_technician_review_keeps_phase_context"
    title: "Production Data Technician review does not blur foundation readiness"
    user_turns:
      - "Foundation is ready for the point-treatment route. I cleaned the analysis file and created the baseline covariates."
      - "Can you check whether the preprocessing and diagnostics are enough before we move to report writing?"
    expected_transitions:
      - path: "project.current_phase"
        expected: "production"
      - path: "foundation_gate.status"
        expected: "ready"
      - path: "analysis.production_loop.selected_reviewers"
        expected_contains:
          - "02-data-technician"
      - path: "analysis.production_loop.reviewer_summaries"
        expected_contains_record:
          reviewer_id: "02-data-technician"
          phase_context: "production"
          foundation_readiness_effect: "unchanged"
          blocking_signal:
            blocks_current_phase: false
            requires_previous_phase_recheck: false
      - path: "analysis.production_loop.readiness"
        expected_any_of:
          - "diagnostics needed"
          - "diagnostics complete"
          - "materials incomplete"
      - path: "analysis.production_loop.foundation_recheck.triggered"
        expected: false
      - path: "production_gate.status"
        expected: "not ready"
    user_facing_expectation: "Treat this as production review of preprocessing and diagnostics, not as a new foundation-gate approval."

  - case_id: "did_production_finds_foundation_recheck"
    title: "Production DiD review discovers route-invalid timing"
    user_turns:
      - "The DiD model ran, but I noticed the treatment date was assigned after stores began changing prices."
      - "Also, there are only two pre-periods and the treated stores were selected because their sales were already falling."
    expected_transitions:
      - path: "analysis.production_loop.foundation_recheck.triggered"
        expected: true
      - path: "analysis.production_loop.foundation_recheck.severity"
        expected_any_of:
          - "serious"
          - "fatal"
      - path: "analysis.production_loop.foundation_recheck.main_skill_decision"
        expected: "return_to_foundation"
      - path: "analysis.production_loop.recommended_next_action"
        expected: "return_to_foundation"
      - path: "project.current_phase"
        expected: "foundation"
      - path: "foundation_gate.status"
        expected_any_of:
          - "exploratory"
          - "blocked"
      - path: "production_gate.status"
        expected_any_of:
          - "not ready"
          - "blocked"
      - path: "evaluator_loop.selected_reviewers"
        expected_contains_any:
          - "02-data-technician"
          - "03-design-planner"
          - "04-dag-builder"
    user_facing_expectation: "Explain the timing/design flaw in practical terms, do not patch around it as a model choice, and ask for a revised route or fallback."

  - case_id: "causal_discovery_support_returns_to_dag_builder"
    title: "Graph discovery is used as support, not an effect-estimation route"
    user_turns:
      - "We have 80 variables from sensors and operations logs. Can causal discovery suggest a graph before we choose adjustment variables?"
      - "I can provide temporal tiers and forbidden directions."
    expected_transitions:
      - path: "analysis.discovery_sidecar.active"
        expected: true
      - path: "analysis.discovery_sidecar.purpose"
        expected_any_of:
          - "graph exploration"
          - "graph comparison"
          - "variable screening"
      - path: "analysis.discovery_sidecar.return_to_phase"
        expected: "foundation"
      - path: "analysis.discovery_sidecar.affects_main_route"
        expected: false
      - path: "main_skill.selected_next_action"
        expected_any_of:
          - "refresh_data_technician_02"
          - "refresh_dag_builder_04"
          - "ask_user"
          - "run_diagnostics"
          - "no_action"
      - path: "analysis.claim_strength"
        expected_any_of:
          - "exploratory"
          - "unknown"
      - path: "foundation_gate.status"
        expected_not_changed_by_discovery_alone: true
    user_facing_expectation: "Describe discovery output as graph hypotheses and send it to DAG Builder before it changes adjustment, route commitment, or claim strength."

  - case_id: "causal_discovery_only_report"
    title: "Discovery-only report stays exploratory and bypasses effect-estimation gates"
    user_turns:
      - "I do not want to estimate an intervention effect yet. Please run causal discovery on these operational variables and write a report about the likely graph and paths."
      - "Use the discovered structure to suggest possible next effect-estimation questions, but do not run those estimates yet."
    expected_transitions:
      - path: "main_skill.primary_intent"
        expected: "causal discovery"
      - path: "main_skill.selected_next_action"
        expected_any_of:
          - "activate_discovery_sidecar"
          - "refresh_report_writer_20"
          - "close_discovery_sidecar"
      - path: "analysis.discovery_sidecar.active"
        expected: true
      - path: "analysis.discovery_sidecar.purpose"
        expected: "discovery-only report"
      - path: "analysis.discovery_sidecar.return_to_phase"
        expected: "reporting"
      - path: "analysis.discovery_sidecar.affects_main_route"
        expected: false
      - path: "foundation_gate.status"
        expected: "not needed"
      - path: "production_gate.status"
        expected: "not needed"
      - path: "analysis.claim_strength"
        expected: "exploratory"
      - path: "analysis.report_writer_20.mode"
        expected_any_of:
          - "discovery report writer"
          - "not selected"
      - path: "analysis.report_writer_20.status"
        expected_any_of:
          - "activated"
          - "discovery report delivered"
          - "not needed"
      - path: "analysis.discovery_sidecar.artifact_paths"
        expected_recorded_or_empty_until_run: true
    user_facing_expectation: "Produce or prepare an exploratory discovery report using graph artifacts, causal-path notes, diagnostics, limitations, and optional next effect-estimation questions; do not present a treatment effect or open effect-estimation gates."

  - case_id: "causal_discovery_paths_do_not_auto_estimate"
    title: "Candidate graph paths become follow-up questions, not automatic estimates"
    user_turns:
      - "The discovery graph suggests marketing_spend -> site_visits -> signups -> revenue. Can you include that path in the report and tell me what we might estimate next?"
    expected_transitions:
      - path: "main_skill.primary_intent"
        expected: "causal discovery"
      - path: "analysis.discovery_sidecar.purpose"
        expected_any_of:
          - "discovery-only report"
          - "graph exploration"
      - path: "analysis.discovery_sidecar.return_to_phase"
        expected: "reporting"
      - path: "analysis.discovery_sidecar.affects_main_route"
        expected: false
      - path: "analysis.route_commitment_status"
        expected_any_of:
          - "exploratory"
          - "unknown"
      - path: "analysis.activated_method_job_subskills"
        expected_not_contains_any:
          - "06-point-treatment-observational"
          - "08-doubly-robust-ml"
          - "16-mediation"
      - path: "main_skill.selected_next_action"
        expected_any_of:
          - "refresh_report_writer_20"
          - "close_discovery_sidecar"
          - "ask_user"
          - "no_action"
      - path: "analysis.claim_strength"
        expected: "exploratory"
    user_facing_expectation: "Call the chain a candidate graph path, list possible follow-up estimands, and ask before starting any effect-estimation route."

  - case_id: "production_gate_ready_report_writer_handoff"
    title: "Completed production materials activate Report Writer handoff"
    user_turns:
      - "Diagnostics are done: balance is acceptable, overlap is limited but documented, sensitivity is in artifacts, and the estimate table and figure are ready."
      - "Please turn this into an executive memo with cautious causal language."
    expected_transitions:
      - path: "project.current_phase"
        expected_any_of:
          - "production"
          - "reporting"
      - path: "foundation_gate.status"
        expected: "ready"
      - path: "production_gate.status"
        expected: "ready"
      - path: "production_gate.can_handoff_to_report_writer"
        expected: true
      - path: "production_gate.reportable_evidence"
        expected: true
      - path: "production_gate.handoff_summary"
        expected_recorded: true
      - path: "analysis.report_writer_20.mode"
        expected: "handoff writer"
      - path: "analysis.report_writer_20.status"
        expected_any_of:
          - "activated"
          - "final report delivered"
      - path: "analysis.execution_stage"
        expected_any_of:
          - "report writer activated"
          - "final report delivered"
      - path: "analysis.claim_strength"
        expected_any_of:
          - "cautious causal"
          - "causal"
    user_facing_expectation: "Create the final-ready memo from recorded foundation and production evidence after the production gate is ready; do not restart a draft/revision loop."
