# Method route recommendation map for causal_check.
# Use this file only to decide which loadable design and optional support
# route to recommend. It does not define paths, authorize execution, or replace
# route_index.yaml.

selection_principles:
  - "Recommend one accountable analysis frame first. Causal design routes provide the identification frame; descriptive_association is the named non-causal fallback."
  - "Strongly prefer recommending one support route with the selected design. Use statistical-validity as the default support unless another support is more immediately relevant."
  - "Do not recommend a support route alone. Pair support with a design or record why design selection is not ready."
  - "Prefer a more specific support only when it changes the target, outcome scale, validity review, mechanism question, dose question, policy use, or transport question."
  - "Use descriptive_association only as an explicit non-causal fallback, never as a shortcut around causal design selection."
  - "If several designs seem possible, recommend causal_check follow-up rather than forcing a method route."

design_candidates:
  - id: randomized_assignment
    recommend_when: "Use when treatment variation comes from a known random assignment process, including trials, A/B tests, encouragement designs, lotteries, cluster assignment, blocked randomization, or quasi-random rollout rules that are documented enough to audit."
    check_before_recommending: "Confirm unit of assignment, time zero, analysis set, compliance, attrition, contamination, outcome window, and whether the target is ITT, per-protocol, CACE/LATE, subgroup, dose, or safety."
    support_hints: "Often pairs with heterogeneous-effects, non-continuous-outcomes, statistical-validity, or policy-making-and-transportability."

  - id: single_time_observational
    recommend_when: "Use when exposure is measured at or near baseline and the main challenge is emulating a point-treatment contrast from observational data with measured confounders."
    check_before_recommending: "Look for a credible target-trial emulation: eligibility, time zero, treatment strategies, comparator, outcome follow-up, confounder timing, positivity, and a reason adjustment could be enough."
    support_hints: "Often pairs with statistical-validity for overlap/balance/DR checks, heterogeneous-effects for modifiers, or dose-response when exposure is not binary."

  - id: longitudinal_gmethods
    recommend_when: "Use when treatment, exposure, adherence, or confounders evolve over time and past treatment affects later confounders or future treatment opportunities."
    check_before_recommending: "Confirm repeated time ordering, treatment histories, censoring, sustained or dynamic regimes, time-varying confounding, follow-up alignment, and whether g-formula, MSM/IPW, longitudinal TMLE, or LMTP language fits."
    support_hints: "Often pairs with dose-response, policy-making-and-transportability, non-continuous-outcomes, or statistical-validity."

  - id: difference_in_differences
    recommend_when: "Use when treatment is a policy, program, shock, or adoption event observed before and after in treated and comparison units, with untreated potential trends as the identifying story."
    check_before_recommending: "Confirm panel or repeated cross-section structure, adoption timing, comparison units, pre-periods, outcome measurement stability, anticipation risk, staggered timing, and whether parallel-trend diagnostics are possible."
    support_hints: "Often pairs with heterogeneous-effects for event-time/group-time contrasts, policy-making-and-transportability for deployment implications, or statistical-validity for placebo and robustness checks."

  - id: regression_discontinuity
    recommend_when: "Use when treatment or eligibility changes at a known cutoff in a running variable and the estimand is local to that threshold."
    check_before_recommending: "Confirm the cutoff rule, running variable measurement, manipulation risk, bandwidth support, continuity plausibility, sharp versus fuzzy assignment, and whether local interpretation is acceptable."
    support_hints: "Often pairs with non-continuous-outcomes for binary or time-to-event endpoints, heterogeneous-effects near the cutoff, or statistical-validity for bandwidth and manipulation diagnostics."

  - id: instrumental_variables
    recommend_when: "Use when there is a plausible source of treatment variation that affects outcome only through treatment, such as encouragement, judge/provider preference, distance, lottery, policy assignment, or genetic instruments."
    check_before_recommending: "Confirm instrument relevance, exclusion restriction, independence, monotonicity or principal-strata target, weak-instrument risk, measured violations, and whether LATE/CACE is the right claim."
    support_hints: "Often pairs with statistical-validity for weak-IV and sensitivity checks, mediation only with extreme caution, or policy-making-and-transportability when LATE transport is the issue."

  - id: synthetic_control_time_series
    recommend_when: "Use when one or a few aggregate units are exposed at a known intervention time and the comparison comes from untreated donor units or pre-intervention time-series structure."
    check_before_recommending: "Confirm intervention timing, donor pool credibility, sufficient pre-periods, no donor contamination, outcome stability, unit comparability, and whether synthetic control, synthetic DiD, ITS, BSTS, or matrix completion is most natural."
    support_hints: "Often pairs with statistical-validity for placebo/permutation checks, policy-making-and-transportability for external interpretation, or non-continuous-outcomes if outcomes need special aggregation."

  - id: interference_spillovers
    recommend_when: "Use when one unit's treatment can affect another unit's outcome through networks, geography, markets, households, peers, clusters, saturation, contamination, or shared environments."
    check_before_recommending: "Confirm interference mechanism, exposure mapping, cluster or network boundaries, saturation measures, direct versus spillover contrasts, partial-interference plausibility, and whether ordinary no-interference methods would be misleading."
    support_hints: "Often pairs with policy-making-and-transportability, heterogeneous-effects, dose-response for exposure intensity, or statistical-validity for sensitivity to exposure definitions."

  - id: descriptive_association
    recommend_when: "Use only when causal identification is not supportable from the current design or facts, but a descriptive, exploratory, or association-only analysis would still help the user understand patterns, data quality, candidate relationships, or reporting limitations."
    check_before_recommending: "State explicitly that this is not a causal design. Confirm the user-facing goal is non-causal, the variables and outcome scale are clear enough for association summaries, and the analysis can report effect sizes, uncertainty, multiplicity, missingness, and selection limits without causal wording."
    support_hints: "Often pairs with statistical-validity for multiple testing, robustness, model diagnostics, and sensitivity of association patterns; may pair with non-continuous-outcomes, heterogeneous-effects, or dose-response only as descriptive target-shaping support."

support_routes:
  - id: heterogeneous-effects
    recommend_when: "Use when the causal target is effect variation across groups, covariates, sites, cohorts, baseline risk, time periods, or biologically/socially meaningful modifiers."
    adds_value_by: "Forces the plan to separate prespecified subgroup contrasts, exploratory CATE search, interaction modeling, prioritization, and claim wording."
    pairing_notes: "Usually needs statistical-validity if data-adaptive subgrouping, ML CATE, multiplicity, or overlap across modifier strata matters."

  - id: dose-response
    recommend_when: "Use when treatment is continuous, ordinal, multi-level, duration-based, intensity-based, cumulative, threshold-like, or better expressed as a shift/intervention on exposure."
    adds_value_by: "Clarifies what dose intervention is causal, which dose range has support, whether a curve or discrete contrast is safer, and where extrapolation begins."
    pairing_notes: "Often needs statistical-validity for support/positivity and non-continuous-outcomes when the endpoint scale affects the dose interpretation."

  - id: mediation
    recommend_when: "Use when the question is about mechanism, pathways, direct and indirect effects, mediator adjustment, or whether an intermediate variable should be controlled."
    adds_value_by: "Keeps mediator timing, mediator-outcome confounding, post-treatment adjustment, interventional versus natural effects, and mechanistic wording separate from total-effect estimation."
    pairing_notes: "Often needs domain_expert review and statistical-validity; avoid if the design cannot support mediator ordering or mediator-outcome assumptions."

  - id: policy-making-and-transportability
    recommend_when: "Use when the evidence must guide a decision, treatment rule, policy value, deployment choice, prioritization, or application to another population, site, time, or setting."
    adds_value_by: "Connects estimand choice to the decision context, utility, constraints, target population, external validity, and whether the analysis should estimate a rule rather than a static effect."
    pairing_notes: "Often follows any design; recommend statistical-validity when deployment depends on model reliability or transport assumptions."

  - id: non-continuous-outcomes
    recommend_when: "Use when the outcome is binary, ordinal, categorical, count, zero-inflated, bounded, time-to-event, recurrent-event, competing-risk, censored, or otherwise not well represented by a simple continuous mean."
    adds_value_by: "Forces the plan to choose the causal scale, follow-up window, censoring approach, estimand interpretation, and whether risk, rate, odds, survival, RMST, or cumulative incidence is appropriate."
    pairing_notes: "Often needs statistical-validity for inference and support; may change whether dose-response or heterogeneous-effects should be framed on absolute or relative scales."

  - id: statistical-validity
    recommend_when: "Use when the main issue is whether the proposed analysis will be statistically credible after the design is chosen: balance, overlap, extreme weights, robustness, nuisance modeling, sensitivity, falsification, negative controls, DR/TMLE/DML, or valid inference."
    adds_value_by: "Adds a cross-design validity layer without replacing the design: diagnostics, estimator choice, fold structure, nuisance roles, feature timing, uncertainty, and failure modes."
    pairing_notes: "This is the default support to consider for most nontrivial analyses, especially observational, longitudinal, IV, DiD, CATE, dose-response, and ML-assisted plans."
