purpose: "Compact route/path index for the causal-consultant router."

rules:
  - "Use this file only to find valid route IDs and file paths."
  - "Only causal_check loads method_route_catalog.yaml when method recommendation is needed."
  - "The router may load only routes that have a path in this index."

core_routes:
  - id: team_lead
    path: references/team_lead.md
    role: "Final manager route. Summarizes the turn, updates aggregate project state, manages approvals, and writes the only user-facing response."
  - id: data_audit
    path: references/data_audit.md
    role: "Data readiness, timing, missingness, leakage, support, validity, and exploratory causal-preparation diagnostics."
  - id: domain_expert
    path: references/domain_expert.md
    role: "Durable domain knowledge, measurement interpretation, common practice, source-grounded precedent, and domain-specific risks."
  - id: causal_discovery
    path: references/causal_discovery.md
    role: "Exploratory graph hypotheses, variable neighborhoods, graph-informed artifacts, and discovery-only structure review."
  - id: causal_check
    path: references/causal_check.md
    role: "Causal formulation, assumptions, claim strength, estimand checks, and method-route recommendation."
  - id: report_writer
    path: references/report_writer.md
    role: "Report-scope precheck, report drafting, academic prose, reviewer responses, HTML conversion, and safer wording."

method_routes_catalog:
  path: references/method_route_catalog.yaml
  loaded_by: causal_check
  use: "Method recommendation catalog. Do not load from main."

shared_references:
  - id: design_support_workflow
    path: references/design_support_workflow.md
    loaded_by: design_references
    use: "Shared analysis_execution gate and approved deep-output artifact_records contract for design routes. Support routes do not load it."

method_routes:
  - id: randomized_assignment
    path: references/design/randomized_assignment.md
    category: design
  - id: single_time_observational
    path: references/design/single_time_observational.md
    category: design
  - id: longitudinal_gmethods
    path: references/design/longitudinal_gmethods.md
    category: design
  - id: difference_in_differences
    path: references/design/difference_in_differences.md
    category: design
  - id: regression_discontinuity
    path: references/design/regression_discontinuity.md
    category: design
  - id: instrumental_variables
    path: references/design/instrumental_variables.md
    category: design
  - id: synthetic_control_time_series
    path: references/design/synthetic_control_time_series.md
    category: design
  - id: interference_spillovers
    path: references/design/interference_spillovers.md
    category: design
  - id: descriptive_association
    path: references/design/descriptive_association.md
    category: design
  - id: heterogeneous-effects
    path: references/support/heterogeneous-effects.md
    category: support
  - id: dose-response
    path: references/support/dose-response.md
    category: support
  - id: mediation
    path: references/support/mediation.md
